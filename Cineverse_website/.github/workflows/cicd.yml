name: CineVerse CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist

  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, movie-service, booking-service, gateway]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      
      - name: Build ${{ matrix.service }}
        working-directory: ./backend/${{ matrix.service }}
        run: mvn clean package -DskipTests
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.service }}-jar
          path: backend/${{ matrix.service }}/target/*.jar

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          npm ci
          npm run test --if-present
      
      - name: Run Backend Tests
        run: |
          cd backend/auth-service && mvn test
          cd ../movie-service && mvn test
          cd ../booking-service && mvn test

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-frontend:latest
      
      - name: Build and Push Auth Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend/auth-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-auth:latest
      
      - name: Build and Push Movie Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend/movie-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-movies:latest
      
      - name: Build and Push Booking Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend/booking-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-booking:latest
      
      - name: Build and Push Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./backend/gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-gateway:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Server
        run: |
          echo "Deployment step - configure based on your hosting platform"
          echo "Options: AWS ECS, GCP Cloud Run, Azure Container Apps, DigitalOcean, Heroku, etc."
          
